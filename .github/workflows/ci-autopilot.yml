name: CI Autopilot

# Watches the repo's other workflows and reacts to failures. `workflow_run`
# requires an explicit `workflows:` list — there is no "watch everything"
# option in the schema, so keep this list in sync if you add workflows.
on:
  workflow_run:
    workflows:
      - "Deploy All Services"
      - "Deploy Daytona (OCI Terraform)"
    types: [completed]

# workflow_run always executes using the workflow file version on the
# default branch, regardless of which branch the triggering run was on —
# this is a GitHub Actions security feature, not a bug. It means a PR
# branch can't redefine this workflow's write permissions to itself.
permissions:
  actions: read
  issues: write
  contents: read

jobs:
  capture-and-triage:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Capture failure, dedupe against open issues, create/update issue, trigger autofix
        uses: actions/github-script@v7
        env:
          AI_SERVICE_URL: ${{ secrets.AI_SERVICE_URL }}
          CI_AUTOPILOT_SECRET: ${{ secrets.CI_AUTOPILOT_SECRET }}
        with:
          script: |
            const crypto = require('crypto');
            const run = context.payload.workflow_run;
            const { owner, repo } = context.repo;

            // ── Stage 1: capture ────────────────────────────────────────────
            const jobsResp = await github.rest.actions.listJobsForWorkflowRun({
              owner, repo, run_id: run.id,
            });
            const failedJobs = jobsResp.data.jobs.filter(j => j.conclusion === 'failure');

            if (failedJobs.length === 0) {
              core.info('workflow_run reported failure but no job shows conclusion=failure (likely cancelled) — skipping.');
              return;
            }

            for (const job of failedJobs) {
              let logText = '';
              try {
                const logsResp = await github.rest.actions.downloadJobLogsForWorkflowRun({
                  owner, repo, job_id: job.id,
                });
                logText = typeof logsResp.data === 'string' ? logsResp.data : '';
              } catch (e) {
                core.warning(`Could not fetch logs for job ${job.id} (${job.name}): ${e.message}`);
              }

              const lines = logText.split('\n');
              // GitHub annotates failing lines with ##[error] — prefer those;
              // fall back to a generic "error" match, then to just the tail
              // of the log if neither pattern is found (e.g. a killed step).
              let errorLines = lines.filter(l => l.includes('##[error]'));
              if (errorLines.length === 0) errorLines = lines.filter(l => /\berror\b/i.test(l));
              const excerpt = (errorLines.length > 0 ? errorLines : lines.slice(-60))
                .slice(-60).join('\n').slice(0, 4000);

              const failedStep = (job.steps || []).find(s => s.conclusion === 'failure');
              const stepName = failedStep ? failedStep.name : 'unknown step';

              // ── Stage 2: fingerprint + dedupe ──────────────────────────────
              const signatureSeed = `${job.name}::${stepName}::${(errorLines[0] || lines.slice(-1)[0] || '').slice(0, 200)}`;
              const fingerprint = crypto.createHash('sha256').update(signatureSeed).digest('hex').slice(0, 12);

              const openIssues = await github.rest.issues.listForRepo({
                owner, repo, state: 'open', labels: 'ci-failure', per_page: 100,
              });
              const existing = openIssues.data.find(i => i.body && i.body.includes(`fingerprint:${fingerprint}`));

              if (existing) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: existing.number,
                  body: `🔁 Still failing as of [run #${run.run_number}](${run.html_url}) (commit \`${run.head_sha.slice(0, 7)}\`).`,
                });
                core.info(`Duplicate of #${existing.number} — commented, no new issue or autofix run.`);
                continue;
              }

              const title = `[CI] ${job.name} failing at "${stepName}" (${run.head_branch})`;
              const body = [
                `<!-- fingerprint:${fingerprint} -->`,
                `**Workflow:** ${run.name}`,
                `**Job:** ${job.name}`,
                `**Failed step:** ${stepName}`,
                `**Branch:** \`${run.head_branch}\`  **Commit:** \`${run.head_sha}\``,
                `**Run:** ${run.html_url}`,
                '',
                '### Log excerpt',
                '```',
                excerpt || '(log unavailable)',
                '```',
              ].join('\n');

              const created = await github.rest.issues.create({
                owner, repo, title, body,
                labels: ['ci-failure', 'auto-generated'],
              });
              core.info(`Created issue #${created.data.number} for ${job.name} / ${stepName}`);

              // ── Stage 3 trigger ─────────────────────────────────────────────
              if (process.env.AI_SERVICE_URL && process.env.CI_AUTOPILOT_SECRET) {
                try {
                  const res = await fetch(`${process.env.AI_SERVICE_URL}/ci-fix`, {
                    method: 'POST',
                    headers: {
                      'Content-Type': 'application/json',
                      'X-CI-Autopilot-Secret': process.env.CI_AUTOPILOT_SECRET,
                    },
                    body: JSON.stringify({
                      repo: `${owner}/${repo}`,
                      workflowName: run.name,
                      jobName: job.name,
                      stepName,
                      branch: run.head_branch,
                      commitSha: run.head_sha,
                      runUrl: run.html_url,
                      issueNumber: created.data.number,
                      logExcerpt: excerpt,
                      baseBranch: 'main',
                    }),
                  });
                  core.info(`Autofix webhook responded ${res.status} for issue #${created.data.number}`);
                  if (!res.ok) {
                    core.warning(`Autofix webhook returned non-2xx: ${await res.text()}`);
                  }
                } catch (e) {
                  core.warning(`Autofix webhook call failed: ${e.message}. Issue #${created.data.number} still created for manual triage.`);
                }
              } else {
                core.info('AI_SERVICE_URL / CI_AUTOPILOT_SECRET not configured — issue created for manual triage only.');
              }
            }
