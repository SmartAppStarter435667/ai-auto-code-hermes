name: Cloudflare Full Stack Deploy

# PAUSED — was `on: push: branches: [main]`.
#
# This workflow deploys two things that aren't actually finished:
#   - Pages project "cursor-app-frontend" (doesn't exist in Cloudflare yet)
#   - Worker "cursor-app-backend" (root wrangler.toml points at src/index.ts,
#     which doesn't exist — root src/ is the Next.js app — and has an
#     unfilled placeholder database_id = "your-d1-id-here")
#
# Both look like an incomplete scaffold, not a CI misconfiguration — patching
# the trigger error just surfaces the next one. Switched to manual dispatch
# so it stops failing on every push while that gets sorted out, without
# deleting anything. To re-enable automatic deploys, change this back to:
#   on:
#     push:
#       branches: [main]
on:
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    name: Deploy Workers AI & Backend
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm install
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

  deploy-frontend:
    runs-on: ubuntu-latest
    name: Deploy App to Cloudflare Pages
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm install
      - name: Build Next.js App
        run: npm run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .next --project-name=cursor-app-frontend
