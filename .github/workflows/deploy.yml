name: Microservices CI/CD Deploy Loop

on:
  push:
    branches:
      - main

jobs:
  # Job 1: Build & Deploy Git operations core UI to Cloudflare Pages
  deploy-git-ops:
    name: Deploy Git Operations Core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Output Core Distribution Build
        run: npm run build
        env:
          NEXT_PUBLIC_APP_ENV: production
          NEXT_PUBLIC_API_URL: https://cursor-edge-ai-api.workers.dev
          NEXT_PUBLIC_DAYTONA_URL: https://cursor-edge-ai-daytona.pages.dev

      - name: Deploy static UI to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .next --project-name=cursor-edge-ai-git-ops

      - name: Health check
        run: |
          chmod +x .github/scripts/health-check.sh
          .github/scripts/health-check.sh pages cursor-edge-ai-git-ops

  # Job 2: Deploy Workers AI & SQLite Durable Object to Cloudflare Worker edge
  deploy-edge-ai:
    name: Deploy Workers AI Microservice
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy Worker and DO Migrate
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 'src/workers/edge-ai-platform'
          command: deploy

      - name: Health check
        run: |
          chmod +x .github/scripts/health-check.sh
          .github/scripts/health-check.sh worker cursor-edge-ai-platform "${{ secrets.CLOUDFLARE_API_TOKEN }}" "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"

  # Job 3: Build & Deploy Daytona environments manager to new Pages Project
  deploy-daytona-preview:
    name: Deploy Daytona Preview Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Daytona module dependencies
        run: |
          if [ -d "daytona-preview" ]; then
            cd daytona-preview && npm ci && npm run build
          else
            echo "Daytona source workspace isolated, running template bundle."
            mkdir -p dist
            echo "<h1>Daytona Isolated Preview Site</h1>" > dist/index.html
          fi

      - name: Deploy Daytona container management UI to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=cursor-edge-ai-daytona

      - name: Health check
        run: |
          chmod +x .github/scripts/health-check.sh
          .github/scripts/health-check.sh pages cursor-edge-ai-daytona
