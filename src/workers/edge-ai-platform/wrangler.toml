
name = "cursor-edge-ai-platform"
main = "index.ts"
compatibility_date = "2024-03-01"

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "AI_CACHE"
id = "your-kv-id-rendered-by-terraform"

[[r2_buckets]]
binding = "LOG_BUCKET"
bucket_name = "cursor-edge-ai-logs"

[[analytics_engine_datasets]]
binding = "METRICS"
dataset = "ai_metrics"

[observability]
enabled = true

[env.production.vars]
ENVIRONMENT = "production"
